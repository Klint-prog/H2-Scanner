<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020408" />
    <meta name="color-scheme" content="dark light" />
    <title>H-2 Visa Scanner Pro</title>
    <meta name="description" content="Varredura inteligente de vagas H-2A e H-2B com validação DOL" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛂</text></svg>" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('h2-theme') || 'dark';
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var resolved = theme === 'system' ? (prefersLight ? 'light' : 'dark') : theme;
          document.documentElement.setAttribute('data-preload-theme', resolved);
          document.documentElement.style.background = resolved === 'light' ? '#f8fafc' : '#020408';
        } catch (_) {
          document.documentElement.style.background = '#020408';
        }
      })();
    </script>
    <style>
      :root,
      html[data-preload-theme="dark"] {
        color-scheme: dark;
        background: #020408;
        --preload-bg: #020408;
        --preload-panel: #0a0a0f;
        --preload-border: #1e293b;
        --preload-text: #f1f5f9;
        --preload-muted: #64748b;
      }
      html[data-preload-theme="light"] {
        color-scheme: light;
        background: #f8fafc;
        --preload-bg: #f8fafc;
        --preload-panel: #ffffff;
        --preload-border: #dbe3ef;
        --preload-text: #0f172a;
        --preload-muted: #64748b;
      }
      html,
      body,
      #root {
        margin: 0;
        min-width: 100%;
        min-height: 100%;
        background: var(--preload-bg, #020408);
      }
      body {
        overflow: hidden;
        color: var(--preload-text, #f1f5f9);
      }
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 18px 18px, rgba(30, 41, 59, .45) 1px, transparent 1px),
          var(--preload-bg, #020408);
        background-size: 32px 32px, auto;
        z-index: 0;
      }
      #root:empty::after {
        content: "H-2 Visa Scanner Pro";
        position: fixed;
        left: 22px;
        top: 18px;
        color: var(--preload-muted, #64748b);
        font: 700 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: .08em;
        z-index: 1;
      }
      .dashboard-shortcuts {
        position: fixed;
        left: 360px;
        top: 17px;
        z-index: 2147483000;
        display: none;
        align-items: center;
        gap: 8px;
      }
      .dashboard-shortcuts.is-visible {
        display: inline-flex;
      }
      .dashboard-shortcut-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 30px;
        padding: 6px 10px;
        border-radius: 7px;
        border: 1px solid rgba(59, 130, 246, .45);
        background: rgba(15, 23, 42, .82);
        color: #dbeafe;
        text-decoration: none;
        font: 700 11px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        box-shadow: none;
        backdrop-filter: blur(8px);
        white-space: nowrap;
      }
      .dashboard-shortcut-link:hover {
        border-color: #60a5fa;
        background: rgba(30, 41, 59, .92);
        color: #ffffff;
      }
      .dashboard-shortcut-link.admin-only {
        display: none;
        border-color: rgba(168, 85, 247, .55);
        color: #ede9fe;
      }
      .dashboard-shortcuts.is-admin .dashboard-shortcut-link.admin-only {
        display: inline-flex;
      }
      @media (max-width: 1180px) {
        .dashboard-shortcuts {
          left: 20px;
          top: 62px;
        }
      }
      @media (max-width: 700px) {
        .dashboard-shortcuts {
          left: 14px;
          right: 14px;
          top: auto;
          bottom: 18px;
          justify-content: flex-end;
        }
        .dashboard-shortcut-link {
          padding: 10px 12px;
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="dashboard-shortcuts" class="dashboard-shortcuts" aria-label="Atalhos de dashboard">
      <a class="dashboard-shortcut-link admin-only" href="/admin-dashboard.html" title="Abrir dashboard administrativo">👑 Admin</a>
      <a class="dashboard-shortcut-link" href="/dashboard.html" title="Abrir dashboard de atividades">📊 Dashboard</a>
    </div>
    <script>
      (function () {
        function parseJwt(token) {
          try {
            return JSON.parse(atob(token.split('.')[1] || ''));
          } catch (_) {
            return null;
          }
        }

        function updateDashboardShortcuts() {
          var box = document.getElementById('dashboard-shortcuts');
          if (!box) return;

          var token = localStorage.getItem('h2_token');
          var user = token ? parseJwt(token) : null;

          box.classList.toggle('is-visible', Boolean(user));
          box.classList.toggle('is-admin', user && user.role === 'admin');
        }

        updateDashboardShortcuts();
        window.addEventListener('storage', updateDashboardShortcuts);
        window.addEventListener('focus', updateDashboardShortcuts);
        setInterval(updateDashboardShortcuts, 1500);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
